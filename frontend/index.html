<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>

  <h1>Список задач (Заглушка)</h1>

  <div id="todo-list">
    <p>Загрузка задач из бэкенда...</p>
  </div>

  <script src="app.js"></script>
</body>
