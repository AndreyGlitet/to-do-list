<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Список задач</title>
</head>
<body>

  <div class="container">
    <h1>Список задач</h1>
    
    <form id="task-form">
      <input type="text" id="task-input" placeholder="Что нужно сделать?" required>
      <button type="submit">Добавить</button>
    </form>

    <div class="filter-buttons">
      <button type="button" id="filter-all" class="filter-btn active">Все</button>
      <button type="button" id="filter-active" class="filter-btn">Активные</button>
      <button type="button" id="filter-completed" class="filter-btn">Выполненные</button>
    </div>
    
    <div id="todo-list">
      <p class="loading">Загрузка задач из бэкенда...</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
